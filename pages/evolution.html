<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Evolution Flow — ML Visual Guide</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
:root {
  --c1:#00d4ff; --c2:#a855f7; --c3:#f472b6; --c4:#8b5cf6;
  --c5:#10b981; --c6:#ef4444; --c7:#14b8a6; --c8:#eab308;
}
.evo-hero { text-align:center; padding:3rem 1rem 2rem; background:linear-gradient(180deg,#080b14,#0a0f1e); border-bottom:1px solid var(--border); }
.evo-hero h1 { font-size:clamp(1.8rem,4vw,3rem); font-weight:900; background:linear-gradient(90deg,var(--primary),var(--secondary),#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:0.75rem; }
.evo-hero p { color:var(--text-muted); max-width:600px; margin:0 auto 1.5rem; font-size:1rem; line-height:1.6; }

.chain-nav { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; padding:1.5rem 1rem; background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:60px; z-index:99; }
.chain-pill { padding:0.35rem 0.9rem; border-radius:2rem; font-size:0.78rem; font-weight:700; cursor:pointer; border:2px solid transparent; transition:all 0.2s; opacity:0.7; }
.chain-pill:hover { opacity:1; transform:translateY(-1px); }

.chains-wrap { max-width:900px; margin:0 auto; padding:2rem 1rem 6rem; }

.chain-block { margin-bottom:4rem; }
.chain-header { display:flex; align-items:center; gap:1rem; padding:1rem 1.5rem; border-radius:1rem; margin-bottom:1.5rem; border:1px solid; }
.chain-header .ch-num { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.12em; opacity:0.8; }
.chain-header .ch-title { font-size:1.1rem; font-weight:800; }
.chain-header .ch-desc { font-size:0.82rem; opacity:0.75; margin-top:0.2rem; }

/* method node */
.method-node { background:var(--card); border:1px solid var(--border); border-radius:1rem; overflow:hidden; transition:box-shadow 0.2s; }
.method-node:hover { box-shadow:0 0 0 1px var(--nc,var(--primary)), 0 4px 24px rgba(0,0,0,0.4); }
.node-header { padding:1rem 1.5rem 0.75rem; cursor:pointer; display:flex; align-items:flex-start; gap:1rem; }
.node-badge { padding:0.25rem 0.75rem; border-radius:2rem; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap; flex-shrink:0; margin-top:0.15rem; }
.node-title { font-size:1rem; font-weight:700; line-height:1.3; }
.node-toggle {
  margin-left:auto; flex-shrink:0;
  width:2.4rem; height:2.4rem;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:2px solid var(--nc,var(--primary));
  display:flex; align-items:center; justify-content:center;
  font-size:1.35rem; font-weight:900; line-height:1;
  color:var(--nc,var(--primary));
  transition:transform 0.3s, background 0.2s;
  user-select:none;
}
.method-node:hover .node-toggle { background:rgba(255,255,255,0.12); }
.method-node.open .node-toggle { transform:rotate(180deg); }

/* use/avoid grid */
.use-avoid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.75rem; }
.ua-box { padding:0.7rem 0.85rem; border-radius:0.6rem; font-size:0.82rem; line-height:1.6; }
.ua-use { background:rgba(0,212,255,0.07); border:1px solid rgba(0,212,255,0.22); }
.ua-use strong { color:var(--primary); display:block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.3rem; }
.ua-avoid { background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.22); }
.ua-avoid strong { color:#ef4444; display:block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.3rem; }

/* vs banner between methods */
.vs-banner { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:0.5rem;
  padding:0.5rem 0.9rem; font-size:0.78rem; color:rgba(255,255,255,0.6); margin:0.4rem 0;
  display:flex; align-items:center; gap:0.5rem; }
.vs-banner::before { content:'VS'; font-size:0.65rem; font-weight:800; color:var(--text-muted); letter-spacing:0.1em; }

/* chain overview flow strip */
.chain-flow { display:flex; align-items:center; flex-wrap:wrap; gap:0; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:0.5rem; }
.cf-node { padding:0.35rem 0.75rem; border-radius:2rem; font-size:0.72rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
.cf-arrow { color:var(--text-muted); font-size:0.9rem; flex-shrink:0; padding:0 0.2rem; }

@media(max-width:600px){
  .pros-cons { grid-template-columns:1fr; }
  .use-avoid { grid-template-columns:1fr; }
  .chain-nav { top:56px; }
}

.node-pills { display:flex; flex-wrap:wrap; gap:0.5rem; padding:0 1.5rem 1rem; }
.npill { font-size:0.72rem; padding:0.2rem 0.6rem; border-radius:4px; font-weight:600; }
.npill-fix { background:rgba(16,185,129,0.12); color:var(--green); }
.npill-arch { background:rgba(0,212,255,0.1); color:var(--primary); }
.npill-pro { background:rgba(168,85,247,0.1); color:var(--secondary); }

.node-body { padding:0 1.5rem 1.25rem; display:none; border-top:1px solid var(--border); padding-top:1rem; }
.method-node.open .node-body { display:block; }

.node-section { margin-bottom:0.9rem; }
.ns-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.35rem; }
.ns-text { font-size:0.875rem; line-height:1.6; color:rgba(255,255,255,0.8); }
.ns-text ul { margin:0.3rem 0 0 1rem; padding:0; }
.ns-text li { margin-bottom:0.25rem; }

.pros-cons { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.5rem; }
.pc-box { padding:0.75rem; border-radius:0.6rem; }
.pc-box h4 { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.4rem; }
.pc-box ul { margin:0 0 0 1rem; padding:0; font-size:0.82rem; line-height:1.6; }
.pros-box { background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); }
.pros-box h4 { color:var(--green); }
.cons-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); }
.cons-box h4 { color:var(--red); }

/* connector between nodes */
.chain-connector { display:flex; flex-direction:column; align-items:center; padding:0.5rem 0; gap:0.3rem; }
.conn-line { width:2px; height:20px; background:linear-gradient(180deg,var(--nc,var(--primary)),transparent); }
.conn-limit { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3); border-radius:0.6rem; padding:0.5rem 1rem; font-size:0.8rem; color:var(--accent); max-width:480px; width:100%; text-align:center; }
.conn-limit::before { content:'⚠ Still can\'t: '; font-weight:700; }
.conn-arrow { font-size:0.75rem; color:var(--text-muted); display:flex; align-items:center; gap:0.4rem; }
.conn-arrow::after { content:'↓'; font-size:1.1rem; color:var(--nc,var(--primary)); }

</style>
</head>
<body>
<div id="site-nav"></div>
<script src="../js/nav.js"></script>

<div class="evo-hero">
  <h1>ML Evolution Flow</h1>
  <p>Every method exists because the previous one had a specific failure. Follow the chains to see how each breakthrough solves a named problem — and introduces the next one.</p>
  <p style="font-size:0.82rem;color:var(--text-muted);">Click any node to expand architecture · pros · cons · and why it was invented</p>
</div>

<div class="chain-nav" id="chainNav"></div>

<div class="chains-wrap" id="chainsWrap"></div>

<script>
const CHAINS = [
  { id:'c1', color:'#00d4ff', title:'From a Single Neuron to a Deep Network',
    desc:'How the perceptron grew into trainable deep networks',
    nodes:[
      { name:'Perceptron', arch:'Single neuron · step activation · binary output · update rule: wᵢ ← wᵢ + η(y−ŷ)xᵢ · bias term b ← b + η(y−ŷ)',
        fixed:'No learnable model existed at all — weights were hand-tuned',
        how:'The (y−ŷ) term only fires when prediction is wrong. xᵢ concentrates correction on active inputs. Perceptron convergence theorem guarantees a solution if one exists.',
        diff:null,
        use:'Linearly separable binary classification · spam vs not-spam on simple features · educational baseline',
        avoid:'Any non-linear problem (XOR, circles) · multi-class tasks · real-world messy data',
        pros:['Simple and fast O(n) per update', 'Provably converges for linearly separable data', 'Foundation of all neural nets'],
        cons:['Only linear decision boundaries', 'Cannot solve XOR or any non-linearly separable problem', 'Step function not differentiable — blocks gradient flow'],
        limit:'learn anything that is NOT linearly separable — most famously XOR' },

      { name:'Multi-Layer Neural Network (MLP) with Sigmoid', arch:'Input → Hidden layers → Output · sigmoid σ(x)=1/(1+e⁻ˣ) · backpropagation via chain rule: ∂L/∂w = ∂L/∂ŷ · σ\'(z) · x',
        fixed:'Single-layer perceptron could only draw straight decision boundaries',
        how:'Non-linear activation between linear layers creates non-linear composition. Universal approximation theorem: even one hidden layer can approximate any bounded continuous function given enough neurons.',
        diff:'Perceptron = 1 layer, step fn, no gradient. MLP = multiple layers, smooth sigmoid, full backprop. The step fn vs sigmoid is the key — sigmoid\'s smoothness enables gradient descent.',
        use:'Non-linear classification · tabular data · medium-sized datasets where you need interpretability',
        avoid:'Very deep networks (sigmoid kills gradients) · images or sequences (use CNN/RNN) · tasks where ReLU networks already exist',
        pros:['Solves XOR and non-linear problems', 'Universal approximator', 'Differentiable → gradient-based training'],
        cons:['Sigmoid derivative ≤ 0.25 → vanishing gradients in deep nets', 'Saturates at extremes', 'Slow to train deep networks'],
        limit:'train deep — sigmoid\'s max derivative is 0.25, so gradients shrink 75% per layer (0.25¹⁰ ≈ 0.000001)' },

      { name:'ReLU Activation', arch:'f(x) = max(0, x) · derivative: 1 if x>0, else 0 · replaces sigmoid in all hidden layers · enables ResNets (50–152+ layers)',
        fixed:'Sigmoid derivative ≤ 0.25 kills gradients after ~4 layers',
        how:'Derivative of 1 means the gradient signal passes through unchanged for active neurons — no shrinkage across 100 layers. Also computationally cheap: just a max() call vs exp().',
        diff:'Sigmoid: smooth, bounded, always differentiable but gradient dies. ReLU: piecewise linear, gradient = 1 or 0, enables arbitrarily deep networks. The "dying" risk is the trade-off.',
        use:'Default for all hidden layers in deep networks · CNNs · any architecture deeper than 3 layers',
        avoid:'Output layer for binary classification (use sigmoid) · multi-class output (use softmax) · when dying neuron risk is high with bad init',
        pros:['Enables very deep networks (100+ layers)', 'Sparse activation — only fires when needed', 'Fast to compute', 'No vanishing gradient for active neurons'],
        cons:['Dying ReLU: neurons with always-negative pre-activation → permanently zero gradient', 'Not zero-centered', 'Unbounded upper range'],
        limit:'prevent dead neurons — a neuron whose pre-activation is always negative has zero gradient permanently' },

      { name:'Leaky ReLU / Parametric ReLU', arch:'f(x) = max(αx, x) · α=0.01 (Leaky) or α learned per neuron (PReLU) · ELU variant: α(eˣ−1) for x<0',
        fixed:'Standard ReLU: neurons with always-negative input become permanently dead (zero gradient, zero update forever)',
        how:'Non-zero slope α for x<0 guarantees a gradient signal even when a neuron is dormant, allowing recovery when input distribution shifts during training.',
        diff:'ReLU cuts off at exactly 0 for negative inputs — Leaky ReLU just reduces slope. Small difference, but eliminates the dead neuron problem entirely. PReLU learns the best slope.',
        use:'When you see many dead neurons in training · when precise weight init isn\'t controlled · PReLU for large models with enough data to learn α',
        avoid:'When standard ReLU is working fine — Leaky rarely beats ReLU enough to justify added complexity',
        pros:['No permanently dead neurons', 'PReLU adapts slope per neuron from data', 'Retains ReLU\'s computational speed'],
        cons:['α is a hyperparameter to tune (Leaky)', 'Still unbounded', 'Marginal improvement over ReLU in most benchmarks'],
        limit:'address overfitting — deep networks with millions of weights still memorize training data' },

      { name:'Dropout + Early Stopping', arch:'Dropout: zero each neuron with prob p (typically 0.5) during training · scale active neurons by 1/(1−p) (inverted dropout) · Early stopping: save best checkpoint when val loss plateaus for patience=N epochs',
        fixed:'Deep networks easily memorize training data — val loss rises while train loss continues to fall (overfitting)',
        how:'Dropout trains an implicit ensemble of 2ⁿ thinned sub-networks, preventing co-adaptation of neurons. Early stopping freezes the model at its best generalization point before overfit deepens.',
        diff:'Vs L2 regularization: Dropout is stochastic and architecture-level, L2 is deterministic and weight-level. They complement each other. Dropout works best on fully connected layers; L2 on conv weights.',
        use:'Fully connected layers in large networks · any model with visible train/val gap · always pair with early stopping',
        avoid:'Small models (adds noise without benefit) · convolutional layers (use BN instead) · inference time (must be disabled)',
        pros:['Dropout: strong regularizer, zero extra parameters', 'Early stopping: completely free — just monitor val loss', 'Both work with any architecture'],
        cons:['More training epochs needed for convergence', 'Dropout disabled at test — minor train/test inconsistency', 'Does not fix fundamental structural mismatch (e.g., dense layers on images)'],
        limit:null },
    ]
  },

  { id:'c2', color:'#f59e0b', title:'From Dense Layers to CNNs for Images',
    desc:'Why spatial structure demands weight-sharing filters',
    nodes:[
      { name:'Convolutional Neural Network (CNN)', arch:'Conv layer: slide F×F filter across input · same weights at every position (weight sharing) · output size = ⌊(W−F+2P)/S⌋+1 · params per layer = (F×F×Cᵢₙ+1)×Cₒᵤₜ',
        fixed:'Dense layers on images: ~1 billion weights for a 1000×1000 image, treat every pixel as independent, cannot reuse an edge-detector across positions',
        how:'Weight sharing: the same 9-number filter detects a horizontal edge anywhere in the image. Local receptive fields mirror how vision works — nearby pixels relate more than distant ones. Translation equivariance: shift input → shift feature map by same amount.',
        diff:'MLP flattens the image — loses all 2D structure and uses separate weights per pixel. CNN\'s filter slides spatially and shares weights. 9 weights detect the same edge everywhere vs. 1M separate weights.',
        use:'Any image/video input · spatial data (maps, medical scans) · when shift-invariance matters',
        avoid:'Tabular/text data · very small images where a small MLP suffices · when sequence order matters (use RNN)',
        pros:['Parameters reduced 1000× vs dense', 'Detects patterns anywhere in the image', 'Hierarchical features: edges → textures → objects', 'State-of-art for vision'],
        cons:['Still equivariant (not invariant) to shifts', 'Needs substantial labeled data from scratch', 'Computationally heavy for large images'],
        limit:'be robust to small spatial shifts — the exact position of a feature still changes the output' },

      { name:'Pooling Layer (Max-Pooling)', arch:'Max-pool 2×2 stride 2: take max value in each 2×2 window · halves W and H · no learnable weights · Global Average Pool (GAP): pool entire feature map to one scalar per channel',
        fixed:'Conv layer has translation equivariance but not invariance — moving a cat\'s eye 1 pixel moves the feature map output 1 pixel',
        how:'Within each pooling window, only whether the feature was present matters, not exactly where. Also aggressively reduces spatial dimensions — cutting compute for all subsequent layers.',
        diff:'Conv produces same-size output (with padding) — Pooling shrinks it. Conv learns features — Pooling discards location. Together they form the CNN\'s compress-and-detect pipeline.',
        use:'After conv layers to build invariance and reduce spatial size · before fully-connected head',
        avoid:'Tasks needing exact spatial output (segmentation) — use strided convolutions instead · when GAP is sufficient to replace FC layers',
        pros:['Translation invariance to small shifts', 'Halves spatial dimensions each time', 'Zero parameters', 'Keeps strongest activations'],
        cons:['Discards precise spatial location', 'Fixed non-overlapping windows', 'Modern nets sometimes use strided conv instead'],
        limit:'provide enough labeled training data — CNNs from scratch require millions of examples' },

      { name:'Transfer Learning + Pretrained CNNs', arch:'Pretrained on ImageNet (1.2M images, 1000 classes) — VGG16, ResNet50, EfficientNet · Freeze layers 1–N · replace final FC head · fine-tune top layers + head on target dataset',
        fixed:'Training CNN from scratch on small datasets immediately overfits: millions of parameters, hundreds of examples',
        how:'Early layers learn universal image primitives (Gabor edges, color blobs) shared across all natural images. Fine-tuning only the head requires ~100× less data and compute.',
        diff:'Scratch training: all weights random, all layers trained, needs millions of images. Transfer: frozen features from ImageNet, only head trained, works with hundreds. Same architecture, entirely different data regime.',
        use:'Small labeled dataset (<10K images) · domain similar to ImageNet (natural photos) · limited GPU budget',
        avoid:'Domain far from ImageNet (X-ray, satellite) — fine-tune more layers or train from scratch · when you have millions of in-domain examples',
        pros:['High accuracy with hundreds of examples', 'Fast training (frozen backbone)', 'Lower compute', 'Works cross-domain with fine-tuning'],
        cons:['ImageNet features may not transfer to medical/satellite imagery', 'Frozen layers = limited adaptation', 'License issues with some pretrained weights'],
        limit:'produce genuinely new visual content — transfer learning recombines existing features' },

      { name:'Data Augmentation', arch:'Random flips · rotations · crops · color jitter · Cutout (erase random patch) · Mixup (blend two images+labels) · applied on-the-fly, labels preserved',
        fixed:'Fixed training set: model memorizes exact pixel patterns, fails on slightly different test images',
        how:'Every valid transformation of a cat is still a cat. Forcing the model to classify augmented views trains robustness to those transformations. Mixup (λx₁+(1−λ)x₂) forces smooth interpolations between classes.',
        diff:'Transfer learning solves data scarcity by borrowing features. Augmentation solves it by multiplying your own data. They stack: use both together for maximum effect on small datasets.',
        use:'Always — essentially free accuracy boost · especially effective paired with transfer learning',
        avoid:'Semantically invalid transforms (horizontal flip on text OCR; vertical flip on medical scans where orientation matters)',
        pros:['Free — no extra labeling', 'Significant accuracy gains', 'Reduces overfitting', 'Works with any architecture'],
        cons:['Cannot create truly new semantic content', 'Wrong augmentations actively hurt accuracy', 'Adds pipeline complexity'],
        limit:null },
    ]
  },

  { id:'c3', color:'#f472b6', title:'Beyond Image Classification',
    desc:'From one label per image to pixel-level and multi-object understanding',
    nodes:[
      { name:'Image Segmentation — U-Net', arch:'Encoder path: Conv+Pool (downsampling ×4) → bottleneck · Decoder path: TransposeConv (upsampling ×4) · Skip connections: copy encoder feature maps → concatenate to decoder at matching resolution',
        fixed:'Standard CNN gives one label per whole image — useless for medical imaging, autonomous driving, or any task needing per-pixel labels',
        how:'Encoder captures what is present (semantic content). Decoder reconstructs where it is at full resolution. Skip connections rescue fine spatial detail that pooling destroys — the bottleneck alone gives blurry masks.',
        diff:'Classifier CNN: image → 1 label. U-Net: image → WxH label map. The symmetric encoder-decoder + skip connections is U-Net\'s signature innovation — without skips it degrades to a blurry autoencoder.',
        use:'Medical image segmentation · satellite land-cover maps · any task needing dense per-pixel predictions with limited labeled data',
        avoid:'When you just need a bounding box (YOLO is faster) · when you need instance separation (use Mask R-CNN)',
        pros:['Per-pixel predictions at full resolution', 'Excellent with small datasets (original trained on 30 images)', 'Skip connections preserve fine detail', 'Symmetric architecture easy to scale'],
        cons:['Heavier than classifiers', 'Pixel-level annotation is expensive to collect', 'Gives semantic masks, not instance IDs or bounding boxes'],
        limit:'locate and count multiple distinct object instances with bounding boxes' },

      { name:'Object Detection — YOLO', arch:'Divide image into S×S grid (e.g. 7×7) · each cell predicts B bounding boxes: (x,y,w,h,objectness) + C class probs · single forward pass end-to-end · loss = λ_coord·bbox_loss + objectness_loss + class_loss',
        fixed:'R-CNN: 2000 region proposals → CNN per proposal → too slow for real-time. Classifiers and segmenters cannot list objects with locations and class names simultaneously.',
        how:'The grid cell that contains an object\'s centre is responsible for detecting it. Predicting all boxes simultaneously in one pass avoids the proposal bottleneck and enables video-speed inference.',
        diff:'U-Net: every pixel gets a class. YOLO: each grid cell gets B bounding boxes + classes. U-Net answers "what is at pixel (i,j)?" — YOLO answers "where is the dog and how big is the box?"',
        use:'Real-time object detection (video, robotics) · applications needing bounding boxes + class labels · edge deployment',
        avoid:'Very small or densely packed objects (YOLO grid limits) · when segmentation mask precision matters',
        pros:['Real-time inference (45+ FPS)', 'End-to-end trainable', 'Global context per prediction', 'Simple unified pipeline'],
        cons:['Struggles with tiny or crowded objects', 'Each cell limited to B detections', 'Lower mAP than two-stage detectors (Faster R-CNN)'],
        limit:'learn useful representations without any labels at all' },

      { name:'Autoencoder', arch:'Encoder: Input → Conv/Dense → Bottleneck z (d << input) · Decoder: z → Conv/Dense → Reconstructed input · Loss = ‖x − x̂‖² (MSE) · Variants: denoising (noisy input, clean target), sparse (L1 on z)',
        fixed:'No labels available — supervised learning is blocked when annotation is unavailable or expensive',
        how:'The bottleneck forces the encoder to compress input into its most informative components — noise and redundancy must be discarded. The reconstruction loss is the self-supervised signal with no labels needed.',
        diff:'Supervised CNN needs labeled pairs (image, class). Autoencoder trains on (image, same image) — the label IS the input. Trade-off: learned features are weaker than supervised, but available on any unlabeled dataset.',
        use:'Anomaly detection (high reconstruction error = anomaly) · pre-training features when labels are scarce · denoising · dimensionality reduction',
        avoid:'When you want sharp generated images (use VAE or GAN) · when labels are available (supervised beats AE features)',
        pros:['Fully unsupervised', 'Features useful for clustering and anomaly detection', 'Denoising variant is robust', 'Interpretable bottleneck'],
        cons:['Reconstructions blurry (MSE averages plausible completions)', 'Latent space not smooth — bad for generation', 'Weaker features than supervised pretraining'],
        limit:null },
    ]
  },

  { id:'c4', color:'#a855f7', title:'From One-Hot Words to LLMs',
    desc:'How language representations evolved from lookup tables to trillion-parameter models',
    nodes:[
      { name:'Word Embeddings (Word2Vec / GloVe)', arch:'Word2Vec Skip-gram: predict context words given target · CBOW: predict target given context · embedding dim d≈100–300 · GloVe: factorize co-occurrence matrix · result: king−man+woman≈queen',
        fixed:'One-hot vectors: 50,000-dim, all orthogonal — "cat" and "dog" are as different as "cat" and "democracy". No semantic structure.',
        how:'Distributional hypothesis: words appearing in similar contexts have similar meanings. SGD trains vectors so the dot product w_target·w_context is high for words that co-occur. Semantic relationships emerge as vector arithmetic.',
        diff:'One-hot: sparse, no similarity, no training needed. Word2Vec: dense, semantic similarity encoded, trained from co-occurrence. The key innovation is that semantics can be captured from raw text without any labels.',
        use:'Feature extraction for classical NLP pipelines · initialising embeddings in custom models · fast semantic similarity lookup · when you cannot afford a full transformer',
        avoid:'When context-dependent meaning matters ("bank") · tasks requiring understanding of long-range dependencies · modern NLP (use contextual embeddings from BERT/GPT instead)',
        pros:['Dense, low-dimensional (100–300 vs 50,000)', 'Encodes semantic similarity and analogy', 'Train once, use everywhere', 'Fast lookup at inference'],
        cons:['One vector per word regardless of context — polysemy ignored', 'Static after training — no adaptation', 'Subword morphology not captured (OOV words get no vector)'],
        limit:'distinguish context-dependent meanings of the same word — "bank" gets one vector whether financial or riverside' },

      { name:'Self-Attention (Q, K, V)', arch:'For each token: Q=WᵩX, K=WₖX, V=WᵥX (learned projections) · Score = QKᵀ/√dₖ · Attention = softmax(Score)·V · new representation = weighted sum of all tokens\' values · complexity O(n²·d)',
        fixed:'Static embeddings assign one fixed vector per word regardless of sentence context — "bank" in "river bank" and "bank account" get identical representations',
        how:'Each token generates a Query ("what am I looking for?"), Key ("what do I offer?"), Value ("what info do I pass?"). High Q·K dot product = high attention weight. The output is a context-sensitive blend of all values.',
        diff:'Word2Vec: one vector per word type. Self-attention: one vector per word token in its specific context. Same word, different sentence → different output vector. This is contextual embedding.',
        use:'Any sequence-to-sequence task requiring context sensitivity · within Transformer encoder/decoder layers · as the core of BERT and GPT',
        avoid:'Very long sequences (O(n²) — use Longformer or FlashAttention) · simple tasks where an RNN suffices',
        pros:['Context-sensitive: same word → different representation per context', 'Captures long-range dependencies in one step (vs RNN\'s O(n) steps)', 'Fully parallelizable — all positions computed simultaneously', 'Differentiable end-to-end'],
        cons:['O(n²) memory and compute in sequence length n', 'Single head specialises in one relationship type', 'No built-in positional encoding — word order lost'],
        limit:'capture multiple simultaneous relationship types — a single head can only attend to one kind of similarity at a time' },

      { name:'Multi-Head Attention', arch:'h parallel attention heads with separate Wᵩʰ, Wₖʰ, Wᵥʰ each of dim d/h · head_i = Attention(QWᵩⁱ, KWₖⁱ, VWᵥⁱ) · MultiHead = Concat(head₁,…,headₕ)·W° · total params same as single head (d/h per head × h = d)',
        fixed:'Single attention head learns one projection — specialises in one relationship type (e.g. syntax) and misses others (semantics, coreference)',

        diff:'Single-head attention: one set of Q,K,V. Multi-head: h independent Q,K,V sets, each dₖ=d/h. Same param count, h× richer representation. Empirically, removing heads hurts consistently — each captures something distinct.',

        avoid:'There is no reason to use single-head attention when multi-head has the same parameter count',

        limit:'process long sequences efficiently — still O(n²) attention and no intrinsic word-order awareness' },

      { name:'Transformer (Encoder + Decoder)', arch:'Encoder: N×[MultiHead self-attn → Add&LayerNorm → FFN(ReLU) → Add&LayerNorm] · Decoder: N×[Masked self-attn → Cross-attn (Q from decoder, K,V from encoder) → FFN → Add&LayerNorm] · Positional encoding: PE(pos,2i)=sin(pos/10000^{2i/d})',
        fixed:'RNNs/LSTMs: sequential computation (no GPU parallelism), gradient path length = sequence length → long-range dependencies lost over 100+ tokens',
        how:'Attention sees every token pair simultaneously — O(1) gradient path between any two positions. Fully parallel on GPU. Sinusoidal positional encodings inject order information. FFN sub-layer adds position-wise non-linearity.',
        diff:'LSTM: sequential, recurrent hidden state, O(n) gradient path. Transformer: parallel, no recurrence, O(1) gradient path. The parallelism is why Transformers can be scaled to billions of parameters — RNNs cannot.',
        use:'Machine translation (original use) · any seq2seq task with separate encoder/decoder · when encoder and decoder contexts differ (translation, summarisation)',

        pros:['Fully parallel training on GPU/TPU', 'O(1) gradient path between any two tokens', 'Scales to billions of parameters', 'Foundation of all modern NLP and vision'],
        cons:['O(n²) attention — 4× memory for 2× sequence length', 'Positional encoding is hand-designed (not intrinsic)', 'Each downstream task still needs labeled data + fine-tuning'],

      { name:'BERT (Encoder-only, Pretrain + Fine-tune)', arch:'12/24 transformer encoder layers · Pretraining: (1) Masked LM — predict 15% randomly masked tokens, (2) Next Sentence Prediction — predict if sentence B follows A · Fine-tune: add task head, train on small labeled set',
        fixed:'Training a full transformer per NLP task requires labeled data and full compute per task — expensive and data-hungry',

        use:'Text classification · NER · QA extraction · semantic similarity · any task where understanding > generation · when you have small labeled datasets',

      { name:'LLM / GPT (Decoder-only)', arch:'Decoder-only transformer · Causal (masked) self-attention: each token attends only to positions ≤ its own · Pretrained on next-token prediction: L = −Σ log P(xₜ|x₁,…,xₜ₋₁) · Scale: 7B–1T parameters, trillions of tokens',
        fixed:'BERT cannot generate text — bidirectional masking makes it impossible to predict tokens autoregressively',

        avoid:'Tasks needing bidirectional understanding (use BERT) · structured extraction where fine-tuned BERT dominates · when hallucinations are unacceptable without RAG mitigation',
        pros:['Fluent long-form generation', 'In-context learning — no fine-tuning needed', 'One model → many tasks via prompt engineering', 'Emergent capabilities (reasoning, coding) at scale'],

      { name:'RAG + Chain-of-Thought', arch:'RAG: embed query → retrieve top-k documents from vector DB (FAISS/Pinecone) → prepend docs to prompt → generate grounded answer · CoT: append "Let\'s think step by step" → model emits reasoning trace before final answer',

        how:'RAG: model reads vetted documents instead of recalling from compressed weights — grounding reduces fabrication. CoT: intermediate reasoning tokens act as a scratchpad — the model can check sub-steps before committing to an answer.',
        diff:'RAG vs fine-tuning: fine-tuning bakes knowledge into weights (expensive, knowledge fixed at training cutoff). RAG retrieves at inference (cheap, knowledge updatable, citable). They can be combined.',
        use:'Knowledge-intensive QA · document search and summarisation · any task where accuracy and citations matter · math/logic reasoning (CoT)',

        pros:['RAG: reduces hallucinations, citable sources, knowledge updatable without retraining', 'CoT: 10–40% accuracy gains on GSM8K, MATH benchmarks', 'Both are inference-time — no retraining'],
        cons:['RAG adds retrieval infrastructure and latency', 'CoT multiplies token cost 3–5×', 'Both still rely on base LLM quality'],
        limit:'be consistently helpful, harmless, and honest — output tone and safety constraints are still unconstrained by the base model' },

      { name:'Alignment — RLHF', arch:'Step 1: supervised fine-tune (SFT) on curated prompt-response pairs · Step 2: collect human pairwise preferences (A vs B) → train reward model RM(prompt, response) → scalar score · Step 3: PPO RL fine-tune LLM to maximise RM score with KL penalty vs SFT',

  { id:'c5', color:'#10b981', title:'From Discriminators to Generators',
    desc:'How generative models evolved from blurry reconstructions to photorealistic synthesis',
    nodes:[
      { name:'Generative Adversarial Network (GAN)', arch:'G: z~N(0,I) → fake image · D: image → P(real) · Minimax loss: min_G max_D [E logD(x) + E log(1−D(G(z)))] · Alternating SGD: update D k steps, then G 1 step',
        fixed:'Autoencoders produce blurry average images — MSE loss penalises all pixel differences equally, rewarding smeared predictions over sharp ones',
        how:'D\'s adversarial gradient provides a richer signal than MSE — it tells G not just "you were wrong" but "here is what makes you look fake." As D improves, the training target moves, forcing continual improvement in G.',
        diff:'Autoencoder uses MSE → blurry. GAN uses adversarial loss → sharp. VAE uses KL divergence for smooth latent space but is still blurry. GAN has no explicit likelihood, making it hard to evaluate but capable of stunning sharpness.',
        use:'High-fidelity image synthesis · super-resolution · style transfer · data augmentation for rare classes',
        avoid:'When training stability is critical · when diversity is essential (mode collapse risk) · when you need a likelihood score',
        pros:['Sharp, photorealistic outputs', 'No explicit density estimation', 'Wide applications: SR, face synthesis, domain transfer'],
        cons:['Training instability (D too strong → G gradient ≈ 0)', 'Mode collapse: G produces one output type', 'No explicit likelihood — evaluation requires FID, IS'],
        limit:'guarantee training stability or diversity — mode collapse and oscillation are GAN\'s fundamental failure modes' },

      { name:'Conditional GAN (cGAN)', arch:'Concatenate class label y (one-hot or embedding) to both G input and D input · G: (z, y) → image of class y · D: (image, y) → real/fake · Pix2Pix: condition on full image for image-to-image translation',
        fixed:'Vanilla GAN generates random samples from the full learned distribution — no way to request "generate a shoe" or "convert sketch to photo"',
        how:'The condition y is visible to both G and D, so D evaluates "is this a realistic image OF class y?" rather than just "is this realistic?" — forcing G to honour the condition.',
        diff:'Vanilla GAN: z → any image. cGAN: (z,y) → image of class y. The only change is concatenating y — but it transforms an unconditional sampler into a controllable generator. Pix2Pix extends this to image-valued conditions.',
        use:'Class-conditional image generation · image-to-image translation (sketch→photo, day→night) · data augmentation for specific classes',
        avoid:'When condition is not available at test time · when you want unconstrained diverse generation',
        pros:['Controllable generation by class/style/attribute', 'Image-to-image translation (Pix2Pix)', 'Better mode coverage per class'],
        cons:['All GAN instabilities persist', 'Condition must be available at inference', 'Mode collapse per condition class still possible'],
        limit:'train stably at all — all GAN variants share fundamental adversarial instability' },

      { name:'Diffusion Model (DDPM)', arch:'Forward process: xₜ = √ᾱₜ x₀ + √(1−ᾱₜ)ε, ε~N(0,I), T=1000 steps · Reverse: U-Net ε_θ(xₜ,t) predicts noise added at step t · Loss = ‖ε − ε_θ(xₜ,t)‖² · DDIM: deterministic sampling in 50 steps',
        fixed:'GANs: adversarial instability, mode collapse, no likelihood. VAEs: blurry outputs. Both lack stable training with broad data coverage.',
        how:'Each reverse denoising step is a simple regression problem — predict what noise was added and subtract it. No adversarial dynamics, no mode collapse. Iterative refinement across 1000 steps produces extraordinary detail.',
        diff:'GAN: one-shot generation from noise, adversarial loss, sharp but unstable. Diffusion: 1000-step denoising, regression loss, stable training, even sharper, but 1000× slower to sample. DDIM closes the speed gap.',
        use:'Highest-quality image/audio/video generation · text-to-image (Stable Diffusion, DALL-E) · scientific generation (protein structure, molecules)',
        avoid:'When inference latency matters and quality can be slightly lower (GAN is faster) · on-device inference without distillation',
        pros:['No mode collapse', 'Stable training (just regression)', 'SOTA image quality (FID)', 'Tractable likelihood', 'Foundation of Stable Diffusion, DALL-E 2/3, Sora'],
        cons:['Slow sampling: 100–1000 forward passes per image', 'High memory during training', 'DDIM/distillation partially address speed'],
        limit:null },
    ]
  },

  { id:'c6', color:'#ef4444', title:'From Supervised Labels to Reward Signals',
    desc:'How agents learn to act without explicit correct-action labels',
    nodes:[
      { name:'Reinforcement Learning Setup (MDP)', arch:'Markov Decision Process: (S, A, P, R, γ) · State s∈S · Action a∈A · Transition P(s\'|s,a) · Reward R(s,a,s\') · Discount γ∈(0,1) · Policy π(a|s) · Goal: max E[Σᵢγⁱrᵢ]',
        fixed:'Supervised learning needs labelled correct actions at every step — unavailable for games, robotics, dialogue where only final outcomes are observable',
        how:'Reward as a learning signal is weaker but far more general than labels. The agent tries actions, observes consequences, and gradually learns which actions lead to high cumulative reward via trial-and-error.',
        diff:'Supervised: (x, correct_y) pairs → minimise loss. RL: (state, action, reward) sequences → maximise expected return. No teacher, just a score. The agent must explore to discover which actions are even worth trying.',
        use:'Sequential decision making · games (Chess, Go, Atari) · robotics · dialogue systems · resource scheduling',
        avoid:'Problems with labeled correct actions (use supervised) · when environment simulation is unavailable or too slow',
        pros:['No per-step labels', 'Discovers superhuman strategies (AlphaGo, AlphaStar)', 'Applicable to any problem with a measurable reward signal'],
        cons:['Sparse rewards → slow learning', 'Requires millions of environment interactions (sample inefficient)', 'No value estimate yet — pure exploration is blind'],
        limit:'numerically compare action quality per state — blind exploration without value estimates is pure trial-and-error' },

      { name:'Q-Learning (Tabular)', arch:'Q-table: stores Q(s,a) for every (state, action) pair · TD update: Q(s,a) ← Q(s,a) + α[r + γ·max_a\'Q(s\',a\') − Q(s,a)] · ε-greedy: explore randomly with prob ε, exploit argmax Q with prob 1−ε',
        fixed:'Without a numeric value estimate per action, the agent cannot compare actions or make systematic choices',
        how:'The Bellman equation decomposes Q(s,a) into immediate reward + best future value. TD learning bootstraps: update Q toward a target computed from the current Q estimate — no full episode needed.',
        diff:'MDP setup defines the problem structure. Q-Learning defines a solution algorithm that fills the Q-table. The ε-greedy policy balances exploration vs exploitation. SARSA uses the actual next action instead of max — on-policy vs off-policy.',
        use:'Small discrete state/action spaces · grid worlds · simple games where a table can fit in memory',
        avoid:'State space too large to enumerate (chess: 10¹²⁰ states) · continuous actions · raw pixel observations',
        pros:['Off-policy: learns optimal Q regardless of exploration strategy', 'Convergence guarantees for tabular MDPs', 'Interpretable Q-table'],
        cons:['Q-table size = |S|×|A| — exponentially large for realistic problems', 'No generalisation across similar states', 'Discrete actions only'],
        limit:'scale to large or continuous state/action spaces — one state per table row is impossible at chess scale' },

      { name:'Deep Q-Network (DQN)', arch:'Q_θ(s) → vector of Q-values for all actions · Input: stack of 4 grayscale 84×84 frames · Two innovations: (1) Experience Replay Buffer (store (s,a,r,s\') tuples, sample randomly) (2) Target Network Q_θ⁻ (frozen copy updated every C steps)',
        fixed:'Tabular Q-learning cannot store or generalise across the 10¹²⁰ states of Atari or the infinite pixel space of raw observations',
        how:'The neural network generalises: similar states get similar Q-values even without seeing them. Experience replay breaks temporal correlations between consecutive transitions. Target network prevents the chasing-a-moving-target instability of naive DQN.',
        diff:'Q-Learning: explicit table, exact lookup. DQN: neural network approximator, generalises, handles pixels. The two training tricks (replay + target network) are essential — without them DQN diverges.',
        use:'Discrete action spaces with high-dimensional observations (pixel-based games) · when a state-of-the-art deep RL baseline is needed',
        avoid:'Continuous action spaces (use DDPG, SAC, PPO) · when sample efficiency is critical (model-based RL is better)',
        pros:['Handles raw pixel inputs end-to-end', 'Generalises across similar states', 'Human-level Atari on 49 games (DeepMind 2015)', 'Foundation of modern deep RL'],
        cons:['Discrete actions only', 'Still needs millions of frames (sample inefficient)', 'Sparse rewards remain difficult', 'Actor-critic methods needed for continuous control'],
        limit:null },
    ]
  },

  { id:'c7', color:'#14b8a6', title:'Finding Structure Without Labels',
    desc:'Clustering algorithms and their evolution from simple centroids to hierarchies',
    nodes:[
      { name:'K-Means Clustering', arch:'Algorithm: (1) Place K random centroids μₖ · (2) Assign xᵢ → argmin_k‖xᵢ−μₖ‖² · (3) Update μₖ = mean of assigned points · (4) Repeat until assignments stop changing · Objective: min Σₖ Σ_{xᵢ∈Cₖ} ‖xᵢ−μₖ‖²',
        fixed:'Supervised learning needs labels — most real-world data is unlabeled, yet natural group structure exists',
        how:'Each E-step (assign) and M-step (update centroids) strictly decreases the within-cluster variance objective. Guaranteed to converge because objective is bounded below by 0 and decreases monotonically.',
        diff:'Supervised classifiers: given labelled examples, learn a boundary. K-Means: no labels, discover boundaries from geometry alone. The evaluation metric (inertia) is internal — no external ground truth needed.',
        use:'Customer segmentation · document clustering · image quantisation · initialising other algorithms · any large-scale spherical clustering task',
        avoid:'Non-spherical clusters (rings, moons) · unknown K · clusters of very different sizes or densities · high-dimensional sparse data',
        pros:['O(nKd) per iteration — scales to millions of points', 'Simple to implement and explain', 'Works well for compact spherical clusters', 'sklearn-ready'],
        cons:['K must be specified in advance', 'Sensitive to random init — use K-Means++', 'Assumes convex, equally-sized clusters', 'Euclidean distance breaks in high dimensions'],
        limit:'choose K automatically, escape bad random seeds, or handle non-spherical cluster shapes' },

      { name:'K-Means++ Init + Elbow / Silhouette', arch:'K-Means++: first centroid random; each subsequent chosen with P(x) ∝ D(x)² (D = distance to nearest chosen centroid) · Elbow: plot inertia vs K, pick the "elbow" bend · Silhouette s(i) = (b−a)/max(a,b), a=mean intra-cluster dist, b=mean nearest-cluster dist',
        fixed:'Random seeds often initialise two centroids in the same true cluster → poor local optimum; K is unknown so every choice feels arbitrary',
        how:'K-Means++ seeds are spread far apart by construction — O(log K) approximation guarantee vs random init. Silhouette scores each point: +1 = well-clustered, 0 = on boundary, −1 = misclassified. Best K = peak silhouette.',
        diff:'K-Means++ is a better initialisation of the same algorithm — same convergence, dramatically better starting point. Elbow/silhouette are evaluation tools, not algorithms — they tell you which K to feed into K-Means.',
        use:'Always use K-Means++ over random init · silhouette for choosing K when clusters should be well-separated · elbow as quick visual heuristic',
        avoid:'Silhouette is O(n²) — too slow for n > 10K; use approx silhouette or Davies-Bouldin instead',
        pros:['K-Means++ cuts iterations and final cost significantly (O(log K) approx)', 'Silhouette: interpretable −1 to +1 range', 'No ground truth needed to evaluate', 'Elbow gives fast visual intuition'],
        cons:['Still assumes spherical clusters', 'Silhouette slow for large datasets', 'Elbow often ambiguous — bend not always sharp'],
        limit:'discover non-spherical, elongated, or hierarchical structure — all K-means variants assume convex clusters' },

      { name:'Hierarchical Agglomerative Clustering (HAC)', arch:'Start: n singleton clusters · Repeatedly merge the two clusters with minimum linkage distance · Linkage options: single=min(d), complete=max(d), average=mean(d), Ward=min ΔVariance · Output: dendrogram (binary merge tree)',
        fixed:'K-Means forces a fixed K upfront and cannot capture nested or elongated cluster shapes that no single partition represents well',
        how:'The dendrogram encodes cluster structure at every scale simultaneously. Cutting at height h gives clusters where all within-cluster merges occurred at distance < h. Single-link\'s min distance can follow elongated chains; Ward\'s variance criterion gives compact clusters like K-Means.',
        diff:'K-Means: flat partition, K fixed, runs in O(nKd). HAC: full hierarchy, K chosen post-hoc from dendrogram, runs in O(n³). K-Means is the tool for large-scale speed; HAC is the tool for small-scale insight.',
        use:'Exploratory analysis of small datasets · when K is truly unknown · when you want to visualise cluster hierarchy · gene expression, document taxonomy',
        avoid:'n > 10,000 points (O(n²)–O(n³) is prohibitive) · when you need repeated runs or online updates',
        pros:['No K required upfront', 'Dendrogram reveals structure at every scale', 'Single-link handles non-convex shapes', 'Deterministic — same result every run'],
        cons:['O(n³) time, O(n²) memory — impractical for large n', 'Greedy merges are irreversible (no backtracking)', 'Sensitive to linkage choice and outliers'],
        limit:null },
    ]
  },

  { id:'c8', color:'#eab308', title:'Classical Methods Chain',
    desc:'Each classical algorithm fixed a specific flaw in its predecessor',
    nodes:[
      { name:'Linear Regression', arch:'ŷ = wᵀx + b · Closed-form: w* = (XᵀX)⁻¹Xᵀy · Gradient descent: w ← w − η·(2/n)Xᵀ(Xw−y) · Basis functions: φ(x) = [x, x², x³] for polynomial regression',
        fixed:'No automated fitting — all model parameters were hand-set by domain experts',
        how:'The MSE objective is a convex bowl — gradient always points toward the unique global minimum. Closed-form gives exact answer in one step (but O(d³) for d features). Gradient descent scales to millions of features.',
        diff:'Starting point for all regression. Every subsequent method either extends it (logistic regression adds sigmoid), regularises it (Ridge/Lasso), or replaces it for non-linear problems (trees, neural nets).',
        use:'Continuous output prediction · when relationship is approximately linear · as a baseline before trying complex models · when coefficient interpretability is required',
        avoid:'Non-linear relationships without feature engineering · classification tasks (use logistic regression) · when outliers dominate (use Huber loss or robust regression)',
        pros:['Exact closed-form solution (XᵀX)⁻¹Xᵀy', 'Coefficients directly interpretable (weight per feature)', 'Fast training and inference', 'Well-understood theoretically'],
        cons:['Only linear relationships (without basis expansion)', 'Outputs unbounded reals — not valid probabilities', 'Sensitive to outliers (MSE squares errors)'],
        limit:'output a probability or class label — produces unbounded real values including negatives' },

      { name:'Logistic Regression', arch:'Log-odds: log(p/(1−p)) = wᵀx + b · Probability: p = σ(wᵀx+b) = 1/(1+e^{−wᵀx−b}) · Loss: cross-entropy H = −Σ[y log p + (1−y) log(1−p)] · Multi-class: softmax extension',
        fixed:'Linear regression on classification outputs wrong class probabilities — can predict 1.7 or −0.3, which are not valid probabilities',
        how:'Sigmoid squashes any real-valued linear score to (0,1). Log-likelihood of Bernoulli distribution is convex in w — one global minimum, gradient descent always converges.',
        diff:'Linear regression: ŷ = wᵀx (unbounded). Logistic regression: p = σ(wᵀx) ∈ (0,1). Only the output layer differs — same linear combination, different activation. Decision boundary is still linear in feature space.',
        use:'Binary classification with interpretable odds ratios · baseline for any binary task · when you need calibrated probabilities · medical risk scores',
        avoid:'Non-linear class boundaries (use SVM with kernel, or neural net) · multi-class with complex interactions (use softmax + NN)',
        pros:['Valid probabilities in (0,1)', 'Convex loss — guaranteed global minimum', 'Log-odds interpretation of coefficients', 'Fast training with gradient descent or Newton'],
        cons:['Linear decision boundary only', 'Cannot solve XOR or concentric circles without manual feature engineering', 'Needs feature scaling'],
        limit:'handle non-linear decision boundaries without manually engineering polynomial or interaction features' },

      { name:'Support Vector Machine (SVM)', arch:'Hard-margin: min ½‖w‖² s.t. yᵢ(wᵀxᵢ+b) ≥ 1 · Soft-margin: add slack ξᵢ, penalty C · Kernel trick: K(xᵢ,xⱼ) = φ(xᵢ)·φ(xⱼ) — RBF: exp(−γ‖xᵢ−xⱼ‖²) · Support vectors: points where yᵢ(wᵀxᵢ+b) = 1',
        fixed:'Logistic regression and perceptron pick any separating hyperplane — many exist, and different choices generalise differently. No principled criterion for which hyperplane to prefer.',
        how:'Maximum margin = minimum ‖w‖ (margin = 2/‖w‖). Larger margin → decision boundary farthest from all training points → best worst-case generalisation (VC theory). Only support vectors determine w — other points irrelevant.',
        diff:'Logistic regression: all points influence w via gradient. SVM: only support vectors matter. Logistic gives probabilities; SVM gives distances to margin. RBF kernel = implicit infinite-dimensional feature map — logistic regression cannot match without explicit features.',
        use:'High-dimensional data (text, genomics) · small-to-medium datasets (n < 100K) · when margin maximisation has theoretical appeal · non-linear boundaries via RBF kernel',
        avoid:'Large datasets n > 100K (O(n²)–O(n³) training) · multi-class without one-vs-rest wrapper · when probability outputs are needed',
        pros:['Maximum margin = strong generalisation guarantee', 'Effective in high dimensions', 'Kernel trick enables non-linear boundaries implicitly', 'Sparse solution (only support vectors)'],
        cons:['O(n²)–O(n³) training — slow on large n', 'C and kernel hyperparameters require careful tuning', 'Kernel SVM is a black box', 'No natural probability output'],
        limit:null },

      { name:'Naïve Bayes', arch:'P(y|x) ∝ P(y)·Πᵢ P(xᵢ|y) · Gaussian NB: P(xᵢ|y) = N(μₖᵢ, σ²ₖᵢ) · Multinomial NB: P(xᵢ|y) ∝ count(xᵢ,y) · Training = counting, no gradient descent',
        fixed:'SVM and logistic regression require iterative gradient-based training — wasteful when data is simple and speed is critical (e.g., spam filter serving millions of requests)',
        how:'Bayes\' theorem + conditional independence assumption → product of simple 1D distributions. Each P(xᵢ|y) estimated by counting or fitting a Gaussian. One pass over data. Prediction = argmax over classes.',
        diff:'Logistic/SVM: discriminative — model P(y|x) directly. Naïve Bayes: generative — model P(x|y)P(y) and invert with Bayes. NB is faster and works with zero data but assumes independence. LR is more accurate when independence is violated.',
        use:'Text spam filtering · document classification · when features are conditionally independent · tiny training sets · real-time classification at scale',
        avoid:'When feature interactions are critical · when probability calibration matters · with highly correlated features',
        pros:['Single pass — O(n) training', 'Works with tiny training sets', 'Strong text classification baseline', 'Handles missing features by ignoring them', 'Interpretable class-conditional distributions'],
        cons:['Feature independence almost always violated', 'Cannot model feature interactions', 'Probabilities poorly calibrated (use Platt scaling to fix)'],
        limit:null },
    ]
  },
];

  pill.style.cssText = `background:${c.color}22;color:${c.color};border-color:${c.color}44;`;
  pill.textContent = `Chain ${i+1}: ${c.title.split(' ').slice(0,4).join(' ')}…`;
  pill.onclick = () => document.getElementById(c.id).scrollIntoView({behavior:'smooth',block:'start'});
  nav.appendChild(pill);
});

// Build chains
const wrap = document.getElementById('chainsWrap');
CHAINS.forEach((chain, ci) => {
  const block = document.createElement('div');
  block.className = 'chain-block';
  block.id = chain.id;

  // Chain header
  const hdr = document.createElement('div');
  hdr.className = 'chain-header';
  hdr.style.cssText = `background:${chain.color}0f;border-color:${chain.color}33;color:${chain.color};`;
  hdr.innerHTML = `<div><div class="ch-num">Chain ${ci+1}</div><div class="ch-title" style="color:${chain.color}">${chain.title}</div><div class="ch-desc" style="color:${chain.color}99">${chain.desc}</div></div>`;
  block.appendChild(hdr);

  // Chain overview flow strip
  const flowStrip = document.createElement('div');
  flowStrip.className = 'chain-flow';
  chain.nodes.forEach((n, ni) => {
    const cfn = document.createElement('span');
    cfn.className = 'cf-node';
    cfn.style.cssText = `background:${chain.color}18;color:${chain.color};border:1px solid ${chain.color}44;`;
    cfn.textContent = n.name;
    flowStrip.appendChild(cfn);
    if (ni < chain.nodes.length - 1) {
      const arr = document.createElement('span');
      arr.className = 'cf-arrow';
      arr.textContent = ' → ';
      flowStrip.appendChild(arr);
    }
  });
  block.appendChild(flowStrip);

  chain.nodes.forEach((node, ni) => {
    // method node
    const mNode = document.createElement('div');
    mNode.className = 'method-node';
    mNode.style.setProperty('--nc', chain.color);
    mNode.style.borderColor = chain.color + '30';

    const prosHtml = node.pros.map(p => `<li>${p}</li>`).join('');
    const consHtml = node.cons.map(c => `<li>${c}</li>`).join('');

    const catLabels = ['Neural Nets','CNNs','Vision+','NLP/LLM','Generative','RL','Unsupervised','Classical'];
    const useHtml = node.use ? `<div class="ua-box ua-use"><strong>✅ Use when</strong>${node.use}</div>` : '';
    const avoidHtml = node.avoid ? `<div class="ua-box ua-avoid"><strong>❌ Avoid when</strong>${node.avoid}</div>` : '';
    const diffHtml = node.diff ? `<div class="node-section"><div class="ns-label" style="color:#f472b6;">How It Differs from Previous</div><div class="ns-text">${node.diff}</div></div>` : '';

    mNode.innerHTML = `
      <div class="node-header" onclick="this.parentElement.classList.toggle('open')">
        <div style="flex:1;min-width:0;">
          <span class="node-badge" style="background:${chain.color}18;color:${chain.color};">
            ${catLabels[ci] || 'ML'}
          </span>
          <div class="node-title" style="color:${chain.color};margin-top:0.4rem;">${node.name}</div>
          <div style="font-size:0.78rem;color:rgba(255,255,255,0.45);margin-top:0.25rem;">🔧 Solves: ${node.fixed.substring(0,70)}${node.fixed.length>70?'…':''}</div>
        </div>
        <div class="node-toggle">⌄</div>
      </div>
      <div class="node-body">
        <div class="node-section">
          <div class="ns-label" style="color:${chain.color};">Architecture &amp; Key Formula</div>
          <div class="ns-text">${node.arch}</div>
        </div>
        <div class="node-section">
          <div class="ns-label" style="color:#10b981;">Why It Works (Mechanism)</div>
          <div class="ns-text">${node.how}</div>
        </div>
        ${diffHtml}
        <div class="pros-cons">
          <div class="pc-box pros-box">
            <h4>Pros</h4>
            <ul>${prosHtml}</ul>
          </div>
          <div class="pc-box cons-box">
            <h4>Cons / Limits</h4>
            <ul>${consHtml}</ul>
          </div>
        </div>
        ${(useHtml || avoidHtml) ? `<div class="use-avoid">${useHtml}${avoidHtml}</div>` : ''}
      </div>`;
    block.appendChild(mNode);

    // connector (if not last node)
    if (ni < chain.nodes.length - 1 && node.limit) {
      const conn = document.createElement('div');
      conn.className = 'chain-connector';
      conn.style.setProperty('--nc', chain.color);
      conn.innerHTML = `
        <div class="conn-line"></div>
        <div class="conn-limit">${node.limit}</div>
        <div class="conn-arrow">which raises a new problem</div>
        <div class="conn-line"></div>`;
      block.appendChild(conn);
    } else if (ni < chain.nodes.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'chain-connector';
      conn.style.setProperty('--nc', chain.color);
      conn.innerHTML = `<div class="conn-line" style="height:30px"></div>
        <div class="conn-arrow">leads to</div>
        <div class="conn-line" style="height:30px"></div>`;
      block.appendChild(conn);
    }
  });

  wrap.appendChild(block);
});
</script>
</body>
</html>
